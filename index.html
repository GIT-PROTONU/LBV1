<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LBV1 Load Cell Monitor</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:      #0d0d12;
      --surface: #16161f;
      --border:  #252535;
      --text:    #e0e0f0;
      --muted:   #60608a;
      --lc1: #ff6384;
      --lc2: #36a2eb;
      --lc3: #ffce56;
      --lc4: #4bc0c0;
      --green: #4ade80;
      --red:   #f87171;
      --amber: #fbbf24;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }

    header h1 { font-size: 1rem; font-weight: 600; letter-spacing: .06em; }

    .header-right { display: flex; align-items: center; gap: 10px; }

    #version-badge { font-size: .75rem; color: var(--muted); }

    #hz-badge {
      font-size: .75rem; font-variant-numeric: tabular-nums;
      padding: 3px 9px; border-radius: 4px;
      background: var(--border); color: var(--muted);
      min-width: 52px; text-align: center;
    }
    #hz-badge.active { background: #0d2a1a; color: var(--green); }

    #mode-badge {
      font-size: .72rem; font-weight: 600; letter-spacing: .08em;
      padding: 3px 9px; border-radius: 4px;
      background: var(--border); color: var(--muted);
      transition: background .2s, color .2s;
    }
    #mode-badge.diag { background: #2e2010; color: var(--amber); }

    #status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--muted); flex-shrink: 0;
      transition: background .3s;
    }
    #status-dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); }

    #connect-btn {
      padding: 6px 16px; border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent; color: var(--text);
      cursor: pointer; font-size: .82rem;
      transition: border-color .15s, color .15s;
    }
    #connect-btn:hover        { border-color: var(--green); color: var(--green); }
    #connect-btn.connected    { border-color: var(--green); color: var(--green); }
    #connect-btn.connected:hover { border-color: var(--red); color: var(--red); }

    /* ── Main layout ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 18px 24px;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }

    /* ── Value cards ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 14px 14px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }
    .card:nth-child(1)::before { background: var(--lc1); }
    .card:nth-child(2)::before { background: var(--lc2); }
    .card:nth-child(3)::before { background: var(--lc3); }
    .card:nth-child(4)::before { background: var(--lc4); }

    .card-label { font-size: .7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .12em; margin-bottom: 8px; }
    .card-value { font-size: 2.1rem; font-weight: 700; font-variant-numeric: tabular-nums; line-height: 1; }
    .card:nth-child(1) .card-value { color: var(--lc1); }
    .card:nth-child(2) .card-value { color: var(--lc2); }
    .card:nth-child(3) .card-value { color: var(--lc3); }
    .card:nth-child(4) .card-value { color: var(--lc4); }
    .card-unit { font-size: .7rem; color: var(--muted); margin-top: 6px; }

    /* ── Chart ── */
    .chart-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      height: 280px;
      position: relative;
    }

    /* ── Controls panel ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .panel-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .row-label {
      font-size: .7rem; color: var(--muted);
      text-transform: uppercase; letter-spacing: .1em;
      min-width: 56px;
    }

    button {
      padding: 6px 14px; border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg); color: var(--text);
      cursor: pointer; font-size: .82rem;
      transition: border-color .15s, background .15s;
    }
    button:hover:not(:disabled) { border-color: #5050a0; background: #1a1a2a; }
    button:disabled { opacity: .3; cursor: not-allowed; }

    .btn-tare  { border-color: var(--green); color: var(--green); }
    .btn-tare:hover:not(:disabled) { background: #0d2016; }

    .btn-diag  { border-color: var(--amber); color: var(--amber); }
    .btn-diag:hover:not(:disabled) { background: #2a1e08; }
    .btn-diag.active { background: #2e2010; }

    /* ── Cal groups ── */
    .cal-group { display: flex; align-items: center; gap: 6px; }

    .cal-name {
      font-size: .75rem; font-weight: 600;
      min-width: 26px; text-align: right;
    }
    .cal-group:nth-child(1) .cal-name { color: var(--lc1); }
    .cal-group:nth-child(2) .cal-name { color: var(--lc2); }
    .cal-group:nth-child(3) .cal-name { color: var(--lc3); }
    .cal-group:nth-child(4) .cal-name { color: var(--lc4); }

    .cal-group button { padding: 5px 11px; font-size: .95rem; line-height: 1; }

    .cal-readout {
      font-size: .75rem;
      font-family: 'Consolas', 'Courier New', monospace;
      font-variant-numeric: tabular-nums;
      padding: 4px 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      min-width: 72px;
      text-align: center;
      color: var(--text);
      letter-spacing: .02em;
    }

    .sep { width: 1px; height: 26px; background: var(--border); margin: 0 2px; }

    /* ── Log ── */
    #log {
      font-size: .72rem; font-family: monospace;
      color: var(--muted); padding: 8px 12px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; height: 48px; overflow-y: auto;
      line-height: 1.6;
      white-space: pre-wrap;
    }

    /* ── No-serial warning ── */
    #no-serial {
      display: none;
      padding: 10px 16px; border-radius: 8px;
      background: #2a1010; border: 1px solid var(--red);
      color: var(--red); font-size: .82rem;
    }
  </style>
</head>
<body>

<header>
  <h1>LBV1 Load Cell Monitor</h1>
  <div class="header-right">
    <span id="version-badge">—</span>
    <span id="hz-badge">— Hz</span>
    <span id="mode-badge">NORMAL</span>
    <span id="status-dot"></span>
    <button id="connect-btn">Connect</button>
  </div>
</header>

<main>

  <div id="no-serial">
    Web Serial API is not available. Open this file in Chrome or Edge (version 89+).
  </div>

  <div class="cards">
    <div class="card"><div class="card-label">LC1</div><div class="card-value" id="val-0">—</div><div class="card-unit" id="unit-0">units</div></div>
    <div class="card"><div class="card-label">LC2</div><div class="card-value" id="val-1">—</div><div class="card-unit" id="unit-1">units</div></div>
    <div class="card"><div class="card-label">LC3</div><div class="card-value" id="val-2">—</div><div class="card-unit" id="unit-2">units</div></div>
    <div class="card"><div class="card-label">LC4</div><div class="card-value" id="val-3">—</div><div class="card-unit" id="unit-3">units</div></div>
  </div>

  <div class="chart-wrap">
    <canvas id="chart"></canvas>
  </div>

  <div class="panel">
    <div class="panel-row">
      <span class="row-label">Control</span>
      <button class="btn-tare" id="btn-tare" disabled>Tare All</button>
      <button class="btn-diag" id="btn-diag" disabled>Diag Mode</button>
    </div>
    <div class="panel-row">
      <span class="row-label">Cal ±10</span>
      <div class="cal-group">
        <span class="cal-name">LC1</span>
        <span class="cal-readout" id="cal-val-0">—</span>
        <button id="cal-0-up" disabled title="q">+</button>
        <button id="cal-0-dn" disabled title="a">−</button>
      </div>
      <div class="sep"></div>
      <div class="cal-group">
        <span class="cal-name">LC2</span>
        <span class="cal-readout" id="cal-val-1">—</span>
        <button id="cal-1-up" disabled title="w">+</button>
        <button id="cal-1-dn" disabled title="s">−</button>
      </div>
      <div class="sep"></div>
      <div class="cal-group">
        <span class="cal-name">LC3</span>
        <span class="cal-readout" id="cal-val-2">—</span>
        <button id="cal-2-up" disabled title="e">+</button>
        <button id="cal-2-dn" disabled title="d">−</button>
      </div>
      <div class="sep"></div>
      <div class="cal-group">
        <span class="cal-name">LC4</span>
        <span class="cal-readout" id="cal-val-3">—</span>
        <button id="cal-3-up" disabled title="r">+</button>
        <button id="cal-3-dn" disabled title="f">−</button>
      </div>
    </div>
  </div>

  <div id="log">Not connected — click Connect and select COM4.</div>

</main>

<script>
// ── Chart ──────────────────────────────────────────────────────────────────
const MAX_PTS = 200;
const LC_COLORS = ['#ff6384', '#36a2eb', '#ffce56', '#4bc0c0'];

const chartDatasets = [0, 1, 2, 3].map(i => ({
  label: `LC${i + 1}`,
  data: Array(MAX_PTS).fill(null),
  borderColor: LC_COLORS[i],
  backgroundColor: LC_COLORS[i] + '14',
  borderWidth: 1.5,
  pointRadius: 0,
  tension: 0.3,
  fill: false,
}));

const chart = new Chart(document.getElementById('chart'), {
  type: 'line',
  data: { labels: Array(MAX_PTS).fill(''), datasets: chartDatasets },
  options: {
    animation: false,
    responsive: true,
    maintainAspectRatio: false,
    interaction: { mode: 'index', intersect: false },
    scales: {
      x: { display: false },
      y: {
        grid:  { color: '#252535' },
        ticks: { color: '#60608a' },
      },
    },
    plugins: {
      legend: { labels: { color: '#e0e0f0', boxWidth: 12, padding: 16 } },
    },
  },
});

// Decouple chart rendering from data rate using requestAnimationFrame
let pendingChart = null;

function pushChart(values) {
  pendingChart = values;
}

(function renderLoop() {
  if (pendingChart) {
    chartDatasets.forEach((ds, i) => {
      ds.data.push(pendingChart[i]);
      if (ds.data.length > MAX_PTS) ds.data.shift();
    });
    chart.update('none');
    pendingChart = null;
  }
  requestAnimationFrame(renderLoop);
})();

// ── DOM refs ───────────────────────────────────────────────────────────────
const valEls    = [0,1,2,3].map(i => document.getElementById(`val-${i}`));
const unitEls   = [0,1,2,3].map(i => document.getElementById(`unit-${i}`));
const calValEls = [0,1,2,3].map(i => document.getElementById(`cal-val-${i}`));
const logEl     = document.getElementById('log');
const modeBadge = document.getElementById('mode-badge');
const hzBadge   = document.getElementById('hz-badge');
const statusDot = document.getElementById('status-dot');
const connectBtn= document.getElementById('connect-btn');
const btnDiag   = document.getElementById('btn-diag');

// ── Hz counter ────────────────────────────────────────────────────────────
let packetCount = 0;
setInterval(() => {
  if (packetCount > 0) {
    hzBadge.textContent = `${packetCount} Hz`;
    hzBadge.classList.add('active');
  } else {
    hzBadge.textContent = '— Hz';
    hzBadge.classList.remove('active');
  }
  packetCount = 0;
}, 1000);

const allCtrlBtns = [
  'btn-tare','btn-diag',
  'cal-0-up','cal-0-dn','cal-1-up','cal-1-dn',
  'cal-2-up','cal-2-dn','cal-3-up','cal-3-dn',
].map(id => document.getElementById(id));

// ── UI helpers ─────────────────────────────────────────────────────────────
function setConnected(on) {
  connectBtn.textContent = on ? 'Disconnect' : 'Connect';
  connectBtn.classList.toggle('connected', on);
  statusDot.classList.toggle('on', on);
  allCtrlBtns.forEach(b => (b.disabled = !on));
  if (!on) calValEls.forEach(el => (el.textContent = '—'));
}

function log(msg) { logEl.textContent = msg; }

function setValues(values) {
  values.forEach((v, i) => {
    valEls[i].textContent = Number.isFinite(v) ? v.toFixed(2) : '—';
  });
}

function setCalValues(values) {
  values.forEach((v, i) => {
    calValEls[i].textContent = Number.isFinite(v) ? v.toFixed(1) : '—';
  });
}

let diagActive = false;

function setDiag(on) {
  diagActive = on;
  modeBadge.textContent = on ? 'DIAG' : 'NORMAL';
  modeBadge.classList.toggle('diag', on);
  btnDiag.classList.toggle('active', on);
  unitEls.forEach(el => (el.textContent = on ? 'raw counts' : 'units'));
}

// ── Serial ─────────────────────────────────────────────────────────────────
let port = null, writer = null, reader = null;
let knownPort = null;

async function send(char) {
  if (!writer) return;
  try { await writer.write(new TextEncoder().encode(char)); }
  catch(e) { log(`Send error: ${e.message}`); }
}

async function disconnect() {
  if (!port) return;
  try { if (reader) { await reader.cancel(); reader.releaseLock(); } } catch(_) {}
  try { if (writer) { writer.releaseLock(); } } catch(_) {}
  try { await port.close(); } catch(_) {}
  reader = null; writer = null; port = null; knownPort = null;
  setConnected(false);
  setDiag(false);
  log('Disconnected.');
}

async function connect() {
  let target = knownPort;

  if (!target) {
    try {
      target = await navigator.serial.requestPort();
    } catch(e) {
      log(`Cancelled: ${e.message}`);
      return;
    }
  }

  try {
    await target.open({ baudRate: 115200 });
  } catch(e) {
    if (e.message.includes('already open')) {
      // still open from previous session — reuse as-is
    } else {
      knownPort = null;
      log('Could not reopen last port — please select again.');
      try {
        target = await navigator.serial.requestPort();
        await target.open({ baudRate: 115200 });
      } catch(e2) {
        log(`Connection failed: ${e2.message}`);
        return;
      }
    }
  }

  port = target;
  knownPort = target;
  writer = port.writable.getWriter();
  setConnected(true);
  log('Connected — waiting for data...');

  // Request cal values after a short delay (handles reconnect to running firmware)
  setTimeout(() => send('c'), 800);

  reader = port.readable.getReader();
  const textDecoder = new TextDecoder();
  let buf = '';

  try {
    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += textDecoder.decode(value, { stream: true });
      let nl;
      while ((nl = buf.indexOf('\n')) !== -1) {
        handleLine(buf.slice(0, nl).trim());
        buf = buf.slice(nl + 1);
      }
    }
  } catch(e) {
    if (port) log(`Read error: ${e.message}`);
  } finally {
    await disconnect();
  }
}

// ── Packet parser ──────────────────────────────────────────────────────────
function parsePipe(str, scale) {
  const parts = str.replace('$', '').split('|');
  if (parts.length !== 4) return null;
  const vals = parts.map(v => Number(v) * scale);
  return vals.every(Number.isFinite) ? vals : null;
}

function handleLine(line) {
  if (!line) return;

  // Firmware banner: "LBV1 v1.3"
  if (line.startsWith('LBV1 v')) {
    document.getElementById('version-badge').textContent = line.slice(5);
    log(`Firmware: ${line} — streaming.`);
    send('c');
    return;
  }

  // Mode toggle: "mode=DIAG" / "mode=NORMAL"
  if (line.startsWith('mode=')) {
    setDiag(line === 'mode=DIAG');
    return;
  }

  // Cal values: "CAL:140000|140000|140000|140000$" (integers ×10)
  if (line.startsWith('CAL:')) {
    const vals = parsePipe(line.slice(4), 0.1);
    if (vals) setCalValues(vals);
    return;
  }

  // Diag: "RAW:v1|v2|v3|v4$" (integers, no scaling)
  if (line.startsWith('RAW:')) {
    const vals = parsePipe(line.slice(4), 1);
    if (vals) { setValues(vals); pushChart(vals); packetCount++; }
    return;
  }

  // Normal: "v1|v2|v3|v4$" (integers ×100)
  if (line.includes('|')) {
    const vals = parsePipe(line, 0.01);
    if (vals) { setValues(vals); pushChart(vals); packetCount++; }
  }
}

// ── Button wiring ──────────────────────────────────────────────────────────
connectBtn.addEventListener('click', () => port ? disconnect() : connect());

document.getElementById('btn-tare').addEventListener('click', () => send('t'));
document.getElementById('btn-diag').addEventListener('click', () => send('p'));

[['q','a'],['w','s'],['e','d'],['r','f']].forEach(([up, dn], i) => {
  document.getElementById(`cal-${i}-up`).addEventListener('click', () => send(up));
  document.getElementById(`cal-${i}-dn`).addEventListener('click', () => send(dn));
});

// ── Web Serial availability check ─────────────────────────────────────────
if (!('serial' in navigator)) {
  document.getElementById('no-serial').style.display = 'block';
  connectBtn.disabled = true;
}
</script>

</body>
</html>
